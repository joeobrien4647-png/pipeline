<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline — Joe's Coding Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --text: #e4e4ef;
            --text-dim: #8888a0;
            --accent-ship: #3b82f6;
            --accent-auto: #8b5cf6;
            --accent-experiment: #f59e0b;
            --accent-revenue: #10b981;
            --accent-maintain: #6b7280;
            --accent-learn: #ec4899;
            --tag-bg: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-top: 3px solid var(--card-accent);
        }

        .stat-card:hover {
            background: var(--surface-2);
            transform: translateY(-2px);
        }

        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 800;
            display: block;
            color: var(--card-accent);
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }

        .stat-card .stat-active {
            font-size: 0.7rem;
            color: var(--card-accent);
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .category-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border-left: 4px solid var(--cat-accent);
        }

        .category-header {
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }

        .category-header:hover {
            background: var(--surface-2);
        }

        .category-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .category-header .cat-icon {
            font-size: 1.4rem;
        }

        .category-header .cat-count {
            font-size: 0.75rem;
            background: var(--tag-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--text-dim);
        }

        .category-header .cat-active-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
        }

        .category-header .chevron {
            color: var(--text-dim);
            transition: transform 0.3s;
            font-size: 1.2rem;
        }

        .category-section.open .chevron {
            transform: rotate(180deg);
        }

        .category-body {
            display: none;
            padding: 0 1.5rem 1.5rem;
        }

        .category-section.open .category-body {
            display: block;
        }

        .category-desc {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Active project section */
        .active-project {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .active-project h3 {
            font-size: 1rem;
            margin-bottom: 0.15rem;
        }

        .active-project .active-status {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        .checklist {
            list-style: none;
        }

        .checklist li {
            padding: 0.4rem 0;
            font-size: 0.85rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .checklist li .check {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .checklist li.done {
            color: var(--text-dim);
            text-decoration: line-through;
        }

        .checklist li.done .check {
            background: var(--accent-ship);
            border-color: var(--accent-ship);
        }

        .checklist li.done .check::after {
            content: '\2713';
            color: white;
            font-size: 11px;
            font-weight: 700;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.35rem;
        }

        /* Backlog table */
        .backlog-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .backlog-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .backlog-table td {
            padding: 0.7rem 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: top;
        }

        .backlog-table tr:last-child td {
            border-bottom: none;
        }

        .backlog-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .backlog-table .item-num {
            color: var(--text-dim);
            font-weight: 600;
            width: 30px;
        }

        .backlog-table .item-name {
            font-weight: 600;
        }

        .priority-tag {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .priority-high { background: rgba(239,68,68,0.15); color: #f87171; }
        .priority-medium { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .priority-low { background: rgba(107,114,128,0.15); color: #9ca3af; }

        .effort-tag {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            background: var(--tag-bg);
            color: var(--text-dim);
            white-space: nowrap;
        }

        .section-divider {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 1.5rem 0 0.75rem;
            font-weight: 600;
        }

        /* Maintain table */
        .maintain-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .maintain-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .maintain-table td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .cadence-tag {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            background: var(--tag-bg);
            color: var(--text-dim);
        }

        .size-tag {
            font-size: 0.6rem;
            padding: 0.15rem 0.45rem;
            border-radius: 6px;
            font-weight: 700;
            white-space: nowrap;
        }

        .size-xs { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .size-s { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .size-m { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .size-l { background: rgba(239,68,68,0.15); color: #f87171; }

        .session-guide {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .session-guide-item {
            text-align: center;
            padding: 0.75rem;
        }

        .session-guide-item .sg-size {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .session-guide-item .sg-time {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .sub-section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin: 1.25rem 0 0.5rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(3, 1fr);
            }
            .container {
                padding: 1rem;
            }
            header h1 {
                font-size: 1.5rem;
            }
            .backlog-table .hide-mobile {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

    function sizeTag(size) {
        return `<span class="size-tag size-${size.toLowerCase()}">${size}</span>`;
    }

    function countItems(cat) {
        let count = cat.active ? 1 : 0;
        if (cat.backlog) count += cat.backlog.length;
        if (cat.items) count += cat.items.length;
        if (cat.sections) cat.sections.forEach(s => count += s.items.length);
        return count;
    }

    // Render stats row
    function renderStats() {
        const row = document.getElementById('stats-row');
        Object.entries(DATA).forEach(([key, cat]) => {
            const count = countItems(cat);
            const activeText = cat.active ? `Active: ${cat.active.name.split('—')[0].trim()}` : 'None active';
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.style.setProperty('--card-accent', cat.accent);
            card.onclick = () => {
                const section = document.getElementById(`cat-${key}`);
                section.classList.toggle('open');
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            card.innerHTML = `
                <span class="stat-num">${count}</span>
                <span class="stat-label">${cat.label}</span>
                <span class="stat-active">${activeText}</span>
            `;
            row.appendChild(card);
        });
    }

    function renderSectionTable(items) {
        let html = `<table class="backlog-table"><thead><tr>
            <th>Size</th><th>Item</th><th class="hide-mobile">Description</th>
        </tr></thead><tbody>`;
        items.forEach(item => {
            html += `<tr>
                <td>${sizeTag(item.size)}</td>
                <td class="item-name">${item.name}</td>
                <td class="hide-mobile">${item.desc}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
        return html;
    }

    // Render categories
    function renderCategories() {
        const container = document.getElementById('categories');

        Object.entries(DATA).forEach(([key, cat]) => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = `cat-${key}`;
            section.style.setProperty('--cat-accent', cat.accent);

            const count = countItems(cat);
            const activeBadge = cat.active
                ? `<span class="cat-active-badge" style="background:${cat.accent}22;color:${cat.accent}">Active</span>`
                : '';

            let bodyHTML = `<p class="category-desc">${cat.desc}</p>`;

            // Active project
            if (cat.active) {
                const tasks = cat.active.tasks;
                const done = tasks.filter(t => t.done).length;
                const pct = Math.round((done / tasks.length) * 100);

                bodyHTML += `
                    <div class="section-divider">Active Project</div>
                    <div class="active-project">
                        <h3>${cat.active.name}</h3>
                        <div class="active-status">${cat.active.status}</div>
                        <ul class="checklist">
                            ${tasks.map(t => `
                                <li class="${t.done ? 'done' : ''}">
                                    <span class="check"></span>
                                    ${sizeTag(t.size)}
                                    <span>${t.text}</span>
                                </li>
                            `).join('')}
                        </ul>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${pct}%;background:${cat.accent}"></div>
                        </div>
                        <div class="progress-label">${done}/${tasks.length} complete (${pct}%)</div>
                    </div>
                `;
            }

            // Ship backlog (special: phases + priority)
            if (key === 'ship' && cat.backlog) {
                bodyHTML += `<div class="section-divider">Backlog (${cat.backlog.length})</div>`;
                bodyHTML += `<table class="backlog-table"><thead><tr>
                    <th>#</th><th>Project</th><th class="hide-mobile">Phases</th><th>Priority</th>
                </tr></thead><tbody>`;
                cat.backlog.forEach((item, i) => {
                    const pClass = item.priority === 'high' ? 'priority-high' : item.priority === 'medium' ? 'priority-medium' : 'priority-low';
                    const sizeBadges = item.sizes ? item.sizes.split(' ').map(s => sizeTag(s)).join(' ') : '';
                    bodyHTML += `<tr>
                        <td class="item-num">${i + 1}</td>
                        <td class="item-name">${item.name}</td>
                        <td class="hide-mobile">${item.phases} phases: ${sizeBadges}</td>
                        <td><span class="priority-tag ${pClass}">${item.priority}</span></td>
                    </tr>`;
                });
                bodyHTML += `</tbody></table>`;
            }

            // Sections-based categories (automate, experiment, revenue, learn)
            if (cat.sections) {
                cat.sections.forEach(sec => {
                    bodyHTML += `<div class="sub-section-label">${sec.label} (${sec.items.length})</div>`;
                    bodyHTML += renderSectionTable(sec.items);
                });
            }

            // Maintain items
            if (cat.items && key === 'maintain') {
                bodyHTML += `<table class="maintain-table"><thead><tr>
                    <th>Size</th><th>System</th><th>Cadence</th><th class="hide-mobile">What to do</th>
                </tr></thead><tbody>`;
                cat.items.forEach(item => {
                    bodyHTML += `<tr>
                        <td>${sizeTag(item.size)}</td>
                        <td class="item-name">${item.system}</td>
                        <td><span class="cadence-tag">${item.cadence}</span></td>
                        <td class="hide-mobile">${item.task}</td>
                    </tr>`;
                });
                bodyHTML += `</tbody></table>`;
            }

            section.innerHTML = `
                <div class="category-header">
                    <h2><span class="cat-icon">${cat.icon}</span> ${cat.label} ${activeBadge}</h2>
                    <div style="display:flex;align-items:center;gap:0.75rem">
                        <span class="cat-count">${count} items</span>
                        <span class="chevron">&#9660;</span>
                    </div>
                </div>
                <div class="category-body">${bodyHTML}</div>
            `;

            section.querySelector('.category-header').onclick = () => {
                section.classList.toggle('open');
            };

            container.appendChild(section);
        });
    }

    renderStats();
    renderCategories();
    </script>
</body>
</html>
